{% load static %}
<html>
<head>
<title>Task Scheduler</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
<script language="javascript">
	function validate(formObj)
	{
	if(formObj.t1.value.length==0)
	{
	alert("Please Enter task title");
	formObj.t1.focus();
	return false;
	}

	if(formObj.t2.value.length==0)
	{
	alert("Please Enter task description");
	formObj.t2.focus();
	return false;
	}
	
	if(formObj.t3.value.length==0)
	{
	alert("Please choose due adte");
	formObj.t3.focus();
	return false;
	}
	
	if(formObj.t5.value.length==0)
	{
	alert("Please Enter tags");
	formObj.t5.focus();
	return false;
	}
	
	return true;
	}
	</script>
	<script language="javascript" type="text/javascript" src="{% static 'datetimepicker.js' %}">
</script>
<style>
body {
  background-image: url("{% static 'images/back.jpg' %}");
}
</style>
</head>
<body>
<div class="main">
  <div class="main_resize">
    <div class="header">
      <div class="logo">
        <h1><span>Task Scheduler System</span><small></small></h1>
      </div>
    </div>
    <div class="content">
      <div class="content_bg">
        <div class="menu_nav">
        <ul>
      
      <li><a href="{% url 'ChangePassword' %}">Reset Password</a></li>
	  <li><a href="{% url 'CreateTask' %}">Create Task</a></li>
	  <li><a href="{% url 'ViewTask' %}">View/Edit/Delete Task</a></li>	 
	   <li><a href="{% url 'MarkComplete' %}">Mark Complete</a></li>	 
	   <li><a href="{% url 'NotificationTime' %}">Set Notification Time</a></li>
	   <li><a href="{% url 'index' %}">Logout</a></li>
   </ul>
        </div>
        <div class="hbg"><img src="{% static 'images/header_images.jpg' %}" width="1020" height="286" alt="" /></div>
      				<center>
<form name="f1"
      method="post"
      action="{% url 'EditTaskAction' %}"
      onsubmit="return validate(this);">

{% csrf_token %}

<h2><b>Edit Task Screen</b></h2>

<font size="3" color="red"><center>{{ data|safe }}</center></font>

<table align="center" width="40%">

    <!-- Hidden Task ID -->
    <input type="hidden" name="task_id" value="{{ task.0 }}">

    <tr>
        <td>Task Title</td>
        <td><input type="text" name="t1" value="{{ task.1 }}"></td>
    </tr>

    <tr>
        <td>Description</td>
        <td><input type="text" name="t2" value="{{ task.2 }}"></td>
    </tr>

    <tr>
        <td>Due Date</td>
        <td><input type="text" name="t3" value="{{ task.3 }}"></td>
    </tr>

    <tr>
        <td>Priority</td>
        <td><input type="text" name="t4" value="{{ task.4 }}"></td>
    </tr>

    <tr>
        <td>Tags</td>
        <td><input type="text" name="t5" value="{{ task.5 }}"></td>
    </tr>

    <tr>
        <td></td>
        <td><input type="submit" value="Update Task"></td>
    </tr>

</table>

</form>
				</div>	
					
				</div>
				
					
	</body>
</html>
