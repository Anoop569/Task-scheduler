{% load static %}
<html>
<head>
<title>Task Scheduler</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
<script language="javascript">
	function validate(formObj)
	{
	if(formObj.t1.value.length==0)
	{
	alert("Please Enter Old Password");
	formObj.t1.focus();
	return false;
	}
	if(formObj.t2.value.length==0)
	{
	alert("Please Enter New Password");
	formObj.t2.focus();
	return false;
	}
	if(formObj.t3.value.length==0)
	{
	alert("Please Enter Confirm Password");
	formObj.t3.focus();
	return false;
	}
	if(formObj.t3.value !== formObj.t2.value)
	{
	alert("New & Confirm Password does not matched");
	formObj.t3.focus();
	return false;
	}
	return true;
	}
	</script>	
</head>
<style>
body {
  background-image: url("{% static 'images/back.jpg' %}");
}
</style>
<body>
<div class="main">
  <div class="main_resize">
    <div class="header">
      <div class="logo">
        <h1><span>Task Scheduler System</span><small></small></h1>
      </div>
    </div>
    <div class="content">
      <div class="content_bg">
        <div class="menu_nav">
         <ul>
      
      <li><a href="{% url 'ChangePassword' %}">Reset Password</a></li>
	  <li><a href="{% url 'CreateTask' %}">Create Task</a></li>
	  <li><a href="{% url 'ViewTask' %}">View/Edit/Delete Task</a></li>	 
	   <li><a href="{% url 'MarkComplete' %}">Mark Complete</a></li>	 
	   <li><a href="{% url 'NotificationTime' %}">Set Notification Time</a></li>
	   <li><a href="{% url 'index' %}">Logout</a></li>
   </ul>
        </div>
        <div class="hbg"><img src="{% static 'images/header_images.jpg' %}" width="1020" height="286" alt="" /></div>
      				<center>
<form name="f1" method="post" action={% url 'ChangePasswordAction' %} onsubmit="return validate(this);">
{% csrf_token %}<br/>
   <h2><b>Reset Password Screen</b></h2>
   
	<font size="3" color="red"><center>{{ data|safe }}</center></font>
						
						<table align="center" width="30%" >
			 <tr><td><font size='' color="black">Old&nbsp;Password</b></td>
			 <td><input type="password" name="t1" style="font-family: Comic Sans MS" size="30"></td></tr>
         
		   <tr><td><font size='' color="black">New&nbsp;Password</b></td>
			 <td><input type="password" name="t2" style="font-family: Comic Sans MS" size="30"></td></tr>

			  <tr><td><font size='' color="black">Confirm&nbsp;Password</b></td>
			 <td><input type="password" name="t3" style="font-family: Comic Sans MS" size="30"></td></tr>

			<tr><td></td><td><input type="submit" value="Submit"></td>
			</table>
				</div>	
					
				</div>
				
					
	</body>
</html>
